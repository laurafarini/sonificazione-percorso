<!DOCTYPE html>
<html>
<head>
  <title>Livelli uditivi - Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --accent: #38bdf8;
    }
    body { 
      margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; 
      display: flex; flex-direction: column; align-items: center; padding: 20px; color: white;
    }
    .header { text-align: center; margin-bottom: 20px; }
    #container { display: flex; flex-direction: row; gap: 20px; background: #1e293b; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .panel { position: relative; width: 640px; height: 480px; border-radius: 10px; overflow: hidden; border: 2px solid #334155; }
    
    /* Cruciale: dimensioni fisse per evitare zoom */
    canvas, video { position: absolute; top: 0; left: 0; width: 640px !important; height: 480px !important; }
    
    video { transform: scaleX(-1); } 
    #output_canvas { transform: scaleX(-1); } 
    
    .controls { 
      position: absolute; top: 10px; right: 10px; z-index: 3; 
      background: rgba(15, 23, 42, 0.9); padding: 12px; border-radius: 10px; 
      font-size: 12px; border: 1px solid var(--accent);
    }
    
    #btnNext {
      position: absolute; bottom: 15px; left: 15px; z-index: 10;
      padding: 12px 24px; cursor: pointer; background: var(--accent);
      color: #0f172a; border: none; border-radius: 50px; font-weight: bold;
      transition: transform 0.2s;
    }
    #btnNext:hover { transform: scale(1.05); }

    .instructions {
      margin-top: 20px; width: 100%; max-width: 1300px;
      padding: 15px; background: rgba(56, 189, 248, 0.1); border-radius: 10px; border-left: 4px solid var(--accent);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>LIVELLI UDITIVI</h1>
    <p>Segui il Percorso del Suono</p>
  </div>

  <div id="container">
    <div class="panel">
      <canvas id="imageCanvas" width="640" height="480"></canvas>
      <canvas id="imageOverlay" width="640" height="480" style="z-index:2;"></canvas>
      <button id="btnNext">PROSSIMO LIVELLO ➔</button>
      <div class="controls">
        <strong>IMPOSTAZIONI</strong><br><br>
        Freq: <span id="min-freq-value">200</span> - <span id="max-freq-value">700</span> Hz<br>
        <input type="range" id="min-freq" min="100" max="500" value="200">
        <input type="range" id="max-freq" min="500" max="2000" value="700">
        <br><br>
        Vol: <span id="min-vol-value">0.00</span> - <span id="max-vol-value">0.30</span><br>
        <input type="range" id="min-vol" min="0.00" max="0.30" value="0.00" step="0.01">
        <input type="range" id="max-vol" min="0.30" max="1.00" value="0.30" step="0.01">
      </div>
    </div>
    <div class="panel">
      <video id="input_video" width="640" height="480" playsinline muted autoplay></video>
      <canvas id="output_canvas" width="640" height="480"></canvas>
    </div>
  </div>

  <div class="instructions">
    <strong>Note di utilizzo:</strong> Muovi la mano davanti alla fotocamera. La punta dell'indice (punto 8) funge da cursore. 
    Il suono cambia in base al colore toccato: <span style="color:#ff4444">ROSSO (Start)</span>, <span style="color:#44ff44">VERDE (Finish)</span>, <strong>NERO (Tracciato)</strong>.
  </div>

  <script>
    // --- SETUP ELEMENTI ---
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const imgCanvas = document.getElementById('imageCanvas');
    const imgCtx = imgCanvas.getContext('2d');
    const overlayCanvas = document.getElementById('imageOverlay');
    const overlayCtx = overlayCanvas.getContext('2d');
    
    let grayscaleData = null;
    let hasWon = false;

 // --- AUDIO ENGINE DEFINITIVO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioCtx.createGain();
masterGain.connect(audioCtx.destination);

const scale = [174.61, 196.00, 220.00, 261.63, 293.66, 349.23, 392.00];
let oscillators = [];
let currentToneType = "";

function stopAllAudio(instant = false) {
    const now = audioCtx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    
    if (instant) {
        masterGain.gain.setValueAtTime(0, now);
    } else {
        masterGain.gain.setTargetAtTime(0, now, 0.015);
    }

    // Fermiamo gli oscillatori vecchi
    oscillators.forEach(o => { try { o.stop(now + 0.1); } catch(e){} });
    oscillators = [];
    currentToneType = "";
}

// ROSSO: Start -> Suono Etereo e Armonico (Effetto "Respiro")
function playStartSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (currentToneType !== "start") {
        stopAllAudio(true);
        currentToneType = "start";
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = "square"; // Suono più "retro-game"
        osc.frequency.setValueAtTime(110, audioCtx.currentTime); 
        osc.connect(g);
        g.connect(masterGain);
        osc.start();
        oscillators = [osc, g];
    }
    
    // Crea un battito ritmico automatico
    const now = audioCtx.currentTime;
    const lfo = Math.sin(now * 10) * 0.5 + 0.5; // Pulsazione veloce
    masterGain.gain.setTargetAtTime(0.1 + (lfo * 0.2), now, 0.05);
}

// BIANCO: Fuori -> Un "Ronzio" elettrico fastidioso (distinguibile dal rosso)
function playErrorSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (currentToneType !== "error") {
        stopAllAudio(true);
        currentToneType = "error";
        
        const osc = audioCtx.createOscillator();
        const noiseFilter = audioCtx.createBiquadFilter();
        
        osc.type = "sawtooth"; // L'onda a dente di sega è "graffiante"
        osc.frequency.setValueAtTime(55, audioCtx.currentTime); // Nota "La" molto bassa
        
        noiseFilter.type = "bandpass"; // Fa passare solo una fascia di frequenze "sporche"
        noiseFilter.frequency.value = 120;
        
        osc.connect(noiseFilter);
        noiseFilter.connect(masterGain);
        osc.start();
        oscillators = [osc];
    }
    masterGain.gain.setTargetAtTime(0.25, audioCtx.currentTime, 0.02);
}

// NERO: Percorso -> Suono puro e armonico
function playPathSound(normX) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    const noteIndex = Math.floor(normX * scale.length);
    const freq = scale[Math.min(noteIndex, scale.length - 1)];

    if (currentToneType !== "path") {
        stopAllAudio(true);
        currentToneType = "path";
        const osc = audioCtx.createOscillator();
        osc.type = "triangle"; // Dolce e flautato
        osc.connect(masterGain);
        osc.start();
        oscillators = [osc];
    }
    // Portamento fluido tra le note
    oscillators[0].frequency.setTargetAtTime(freq, now, 0.08);
    masterGain.gain.setTargetAtTime(0.3, now, 0.05);
}

    // VERDE: Arpeggio di Vittoria
    function playVictorySound() {
        stopAllAudio();
        const now = audioCtx.currentTime;
        [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.value = f;
            osc.connect(g);
            g.connect(audioCtx.destination);
            g.gain.setValueAtTime(0, now + (i*0.1));
            g.gain.linearRampToValueAtTime(0.3, now + (i*0.1) + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, now + (i*0.1) + 0.5);
            osc.start(now + (i*0.1));
            osc.stop(now + (i*0.1) + 0.6);
        });
    }

    // --- LOGICA LIVELLI ---
    const lineWidthNera = 60, lineWidthColori = 64, colorBlockLength = 60;
    const levels = [
      function l1() { fillRect("white", 0, 0, 640, 480); drawTrace("black", lineWidthNera, [[50, 240], [590, 240]]); fillRect("red", 50-60, 240-32, 60, 64); fillRect("green", 590, 240-32, 60, 64); },
      function l2() { fillRect("white", 0, 0, 640, 480); drawTrace("black", 60, [[50, 240], [200, 240], [200, 100], [440, 100], [440, 240], [590, 240]]); fillRect("red", 50-60, 240-32, 60, 64); fillRect("green", 590, 240-32, 60, 64); },
      function l3() { fillRect("white", 0, 0, 640, 480); drawTrace("black", 50, [[50, 380], [180, 380], [180, 260], [310, 260], [310, 140], [440, 140], [440, 260], [590, 260]]); fillRect("red", 50-60, 380-25, 60, 50); fillRect("green", 590, 260-25, 60, 50); },
      function l4() { fillRect("white", 0, 0, 640, 480); drawTrace("black", 40, [[50, 240], [150, 240], [150, 100], [250, 100], [250, 240], [390, 240], [390, 100], [490, 100], [490, 240], [590, 240]]); fillRect("red", 50-60, 240-20, 60, 40); fillRect("green", 590, 240-20, 60, 40); },
      function l5() { fillRect("white", 0, 0, 640, 480); drawTrace("black", 30, [[50, 100], [540, 100], [540, 240], [220, 240], [220, 380], [590, 380]]); fillRect("red", 50-60, 100-15, 60, 30); fillRect("green", 590, 380-15, 60, 30); }
    ];

    function fillRect(c, x, y, w, h) { imgCtx.fillStyle = c; imgCtx.fillRect(x, y, w, h); }
    function drawTrace(c, lw, pts) { imgCtx.strokeStyle = c; imgCtx.lineWidth = lw; imgCtx.lineCap = "round"; imgCtx.lineJoin = "round"; imgCtx.beginPath(); imgCtx.moveTo(pts[0][0], pts[0][1]); for (let i = 1; i < pts.length; i++) imgCtx.lineTo(pts[i][0], pts[i][1]); imgCtx.stroke(); }

    let currentLevel = 0;
    function loadLevel(idx) {
      currentLevel = idx; hasWon = false;
      imgCtx.clearRect(0, 0, 640, 480); levels[currentLevel]();
      const raw = imgCtx.getImageData(0, 0, 640, 480);
      grayscaleData = new ImageData(new Uint8ClampedArray(raw.data), 640, 480);
      const d = grayscaleData.data;
      for (let i = 0; i < d.length; i += 4) {
        let r=d[i]/255, g=d[i+1]/255, b=d[i+2]/255, max=Math.max(r,g,b), min=Math.min(r,g,b), delta=max-min, h=0;
        if(delta!==0){ if(max===r) h=60*(((g-b)/delta)%6); else if(max===g) h=60*((b-r)/delta+2); else h=60*((r-g)/delta+4); }
        d[i]=Math.round(((h<0?h+360:h)/360)*255); d[i+1]=Math.round((max===0?0:delta/max)*255); d[i+2]=Math.round(max*255);
      }
      document.getElementById('btnNext').innerText = `LIVELLO ${currentLevel + 1}/${levels.length} ➔`;
    }

    // --- MEDIAPIPE & LOOP ---
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

    hands.onResults(results => {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, 640, 480);
      canvasCtx.drawImage(results.image, 0, 0, 640, 480);
      overlayCtx.clearRect(0, 0, 640, 480);

      let handDetected = false;
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        handDetected = true;
        for (const handLms of results.multiHandLandmarks) {
          // DISEGNO ORIGINALE SUL VIDEO (Verde e Rosso)
          drawConnectors(canvasCtx, handLms, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
          drawLandmarks(canvasCtx, handLms, {color: '#FF0000', lineWidth: 1});
          
          // DISEGNO SPECULARE SUL CANVAS LIVELLI
          const mirroredHandLms = handLms.map(l => ({ x: 1 - l.x, y: l.y, z: l.z }));
          drawConnectors(overlayCtx, mirroredHandLms, HAND_CONNECTIONS, {color: '#38bdf8', lineWidth: 2});
          drawLandmarks(overlayCtx, mirroredHandLms, {color: '#FF0000', lineWidth: 1});

          // COORDINATE PUNTA INDICE (PUNTO 8)
          const x = mirroredHandLms[8].x * 640;
          const y = mirroredHandLms[8].y * 480;
          const normX = mirroredHandLms[8].x;

          // MIRINO SULL'INDICE
          overlayCtx.strokeStyle = 'cyan'; 
          overlayCtx.lineWidth = 2;
          overlayCtx.strokeRect(x - 10, y - 10, 20, 20);

          if (grayscaleData) {
            const px = Math.floor(x), py = Math.floor(y);
            if (px >= 0 && px < 640 && py >= 0 && py < 480) {
              const i = (py * 640 + px) * 4;
              const h = grayscaleData.data[i], s = grayscaleData.data[i+1], v = grayscaleData.data[i+2];

              const isBlack = v < 60;
              const isWhite = v > 180 && s < 60;
              const isRed = v > 70 && s > 100 && (h < 25 || h > 230);
              const isGreen = v > 70 && s > 100 && (h > 60 && h < 110);

              let statusText = "";

              if (isRed) { 
                  statusText = "START";
                  hasWon = false; 
                  playStartSound();
              }
              else if (isGreen) { 
                  statusText = "FINISH!";
                  if (!hasWon) {
                      playVictorySound(); 
                      hasWon = true;      
                  }
              }
              else if (isBlack) { 
                  statusText = "ROAD";
                  hasWon = false; 
                  playPathSound(normX);
              }
              else if (isWhite) { 
                  statusText = "OUT";
                  hasWon = false;
                  playErrorSound(); 
              }
              else { 
                  stopAllAudio();
              }

              if (statusText !== "") {
                overlayCtx.fillStyle = 'rgba(255,255,255,0.8)'; 
                overlayCtx.fillRect(x + 15, y - 30, 60, 20);
                overlayCtx.fillStyle = 'black'; 
                overlayCtx.font = 'bold 10px sans-serif';
                overlayCtx.fillText(statusText, x + 20, y - 16);
              }
            }
          }
        }
      }
      if (!handDetected) stopAllAudio();
      canvasCtx.restore();
    });

    const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 });
    document.getElementById('btnNext').onclick = () => { loadLevel((currentLevel + 1) % levels.length); };
    camera.start(); loadLevel(0);
  </script>
</body>
</html>
